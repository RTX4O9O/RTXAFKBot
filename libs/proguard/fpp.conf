# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# ProGuard — FakePlayerPlugin  |  FULL OBFUSCATION
#
# injars / outjars are supplied on the command line by the Maven exec plugin.
# All relative paths are resolved from this file's directory:  libs/proguard/
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# ── Note: Java runtime jmods are intentionally NOT listed here ────────────────
# Adding jmods triggers ProGuard's full class-hierarchy preverification, which
# fails because Bukkit's JavaPlugin superclass chain cannot be fully resolved
# without every transitive API jar. Missing refs are silenced by -dontwarn ** below.

# ── Server / plugin API jars (provided at runtime — not bundled in the jar) ───
-libraryjars ../paper-1.21.11-mojang-mapped.jar
# Bukkit/Paper API — contains JavaPlugin, Plugin, CommandSender, etc.
# Required for ProGuard's preverification to resolve the FakePlayerPlugin → JavaPlugin
# class hierarchy when computing StackMapTable LUB entries.
-libraryjars ../paper-api-1.21.11.jar
# Adventure API — used by Paper API; required for Component hierarchy resolution.
-libraryjars ../adventure-api.jar
-libraryjars ../adventure-key.jar
-libraryjars ../api-5.5.jar
-libraryjars ../placeholderapi-2.11.6.jar
-libraryjars ../authlib-4.0.43.jar
# Note: FastStats jars are excluded from libraryjars — they're loaded at runtime
# via URLClassLoader (not shaded), and their org.json transitive dep causes a JVM
# crash in ProGuard. Missing FastStats refs are silenced by -dontwarn ** below.

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# KEEP RULES  ──  what must NOT be renamed or removed
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# ── Plugin entry point — referenced by `main:` in plugin.yml ──────────────────
-keep public class me.bill.fakePlayerPlugin.FakePlayerPlugin {
    public *;
}

# ── NMS subclasses — method names must match the parent exactly ───────────────
# Renaming any overridden method breaks NMS dispatch at runtime.

-keep public class me.bill.fakePlayerPlugin.fakeplayer.network.FakeServerGamePacketListenerImpl {
    public *;
    protected *;
}

-keep public class me.bill.fakePlayerPlugin.fakeplayer.network.FakeConnection {
    public *;
    protected *;
}

-keep public class me.bill.fakePlayerPlugin.fakeplayer.network.FakeChannel {
    public *;
    protected *;
}

# FakeChannelPipeline implements the Netty ChannelPipeline interface directly —
# every method name is fixed by the interface contract.
-keep public class me.bill.fakePlayerPlugin.fakeplayer.network.FakeChannelPipeline {
    public *;
}

# ── Bukkit event handlers ─────────────────────────────────────────────────────
# Primary rule: keep methods annotated with @EventHandler (annotation-safe).
# The server discovers handlers by scanning for this annotation at runtime.
-keepclassmembers class * implements org.bukkit.event.Listener {
    @org.bukkit.event.EventHandler public void *(...);
}

# Safety net: also keep all public on*() methods so handlers named
# onPlayerJoin / onBlockBreak etc. survive even without the annotation check.
-keepclassmembers class * implements org.bukkit.event.Listener {
    public void on*(...);
}

# ── Bukkit command / tab-complete callbacks ────────────────────────────────────
-keepclassmembers class * implements org.bukkit.command.CommandExecutor {
    public boolean onCommand(...);
}

-keepclassmembers class * implements org.bukkit.command.TabCompleter {
    public java.util.List onTabComplete(...);
}

# ── Plugin-messaging (BungeeCord / Velocity) ──────────────────────────────────
-keepclassmembers class * implements org.bukkit.plugin.messaging.PluginMessageListener {
    public void onPluginMessageReceived(...);
}

# ── Enum boilerplate (name() / values() / valueOf() used in config parsing) ───
-keepclassmembers enum * {
    public static **[] values();
    public static ** valueOf(java.lang.String);
    public final java.lang.String name();
    public final int ordinal();
}

# ── Shaded JDBC drivers — accessed via Class.forName() ────────────────────────
# ProGuard cannot trace through Class.forName("org.sqlite.JDBC") or
# Class.forName("com.mysql.cj.jdbc.Driver"), so it strips both driver packages
# entirely during shrinking (original: 1301 classes → 108 without these rules).
# Without them the plugin loads but the database fails immediately at runtime.
-keep class org.sqlite.** { *; }
-keep class com.mysql.**  { *; }

# ── Checked exception classes ─────────────────────────────────────────────────
-keep public class * extends java.lang.Exception

# ── Java serialization (future-proofing) ──────────────────────────────────────
-keepclassmembers class * implements java.io.Serializable {
    static final long serialVersionUID;
    private void writeObject(java.io.ObjectOutputStream);
    private void readObject(java.io.ObjectInputStream);
    java.lang.Object writeReplace();
    java.lang.Object readResolve();
}

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# OBFUSCATION SETTINGS  ──  maximum aggressiveness
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# Flatten all renamed classes into a single short package (fpp).
# Classes kept with their original name are unaffected by repackaging.
-repackageclasses 'fpp'

# Required so ProGuard can widen access modifiers when repackaging.
-allowaccessmodification

# Reuse the same short identifier for methods/fields with different signatures.
# Makes decompiled code significantly harder to read.
# !! DISABLED — Paper's plugin remapper (AutoRenamingTool / ART) indexes fields
# !! by name only; overloaded names in the same class cause a duplicate-key crash
# !! at server startup ("Duplicate key l ... Collectors.toMap").
# -overloadaggressively

# Custom dictionary of visually-similar l/I/O identifiers — decompiled code
# becomes nearly unreadable at a glance.
-obfuscationdictionary        identifiers.txt
-classobfuscationdictionary   identifiers.txt
-packageobfuscationdictionary identifiers.txt

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# GENERAL OPTIONS
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# Do not use mixed-case class names (safer on case-insensitive file systems).
-dontusemixedcaseclassnames

# Analyse non-public library classes so inheritance can be resolved properly.
-dontskipnonpubliclibraryclasses
-dontskipnonpubliclibraryclassmembers

# Skip optimisation — not needed; obfuscation pass is sufficient.
# Optimisation is unsafe for Minecraft plugins (inlining / field removal
# can break Bukkit's reflective access patterns).
-dontoptimize

# Preverification is required for Java 7+ class files (major version >= 51).
# Maven compiles with --release 21, so the JVM verifier demands StackMapTable
# at every branch target.  -dontpreverify strips those attributes, causing:
#   VerifyError: Expecting a stackmap frame at branch target N
# We enable preverification here and rely on -dontwarn ** (below) to silence
# any incomplete-hierarchy warnings from shaded MySQL/SQLite internals.
# -dontpreverify   ← intentionally removed

# Print verbose processing log.
-verbose

# ── Bytecode attributes to preserve ──────────────────────────────────────────
# StackMapTable: REQUIRED by the Java 7+ JVM verifier for any method containing
#   a branch instruction.  Maven compiles with --release 21, so all input class
#   files already have correct StackMapTable entries.  ProGuard's obfuscation
#   pass only renames constant-pool references (class/method/field names) — it
#   does NOT change bytecode offsets or control-flow, so the existing frames
#   remain byte-for-byte valid after renaming.  Preserving them here avoids the
#   need to remove -dontpreverify (which would crash on shaded MySQL internals).
#   Without this, ProGuard strips StackMapTable and Paper's JVM verifier throws:
#     VerifyError: Expecting a stackmap frame at branch target N
# Exceptions: preserves checked-exception tables (required by Bukkit / Paper
#   plugin lifecycle reflection and annotation processors).
# *Annotation*: preserves runtime annotations (@EventHandler, etc.) that Bukkit
#   and Paper discover via reflection at startup.
# Signature: preserves generic type signatures — required by some Paper/Bukkit
#   internal APIs that use reflection on parameterised types.
-keepattributes StackMapTable,Exceptions,*Annotation*,Signature

# Write a name-mapping file alongside the output jars for stack-trace decoding.
# Path is relative to this file (libs/proguard/) → two levels up = project root.
-printmapping ../../target/mapping.txt

# ── Resource file adaptation ───────────────────────────────────────────────────
# Rename resource files that follow a class-name pattern.
-adaptresourcefilenames **.properties,META-INF/MANIFEST.MF

# Rewrite class-name references found inside properties files only.
# !! YAML files (plugin.yml, config.yml, language/*.yml, etc.) are intentionally
# !! excluded: they contain multi-byte UTF-8 sequences that ProGuard corrupts when
# !! it processes them in its internal (non-UTF-8-aware) resource-content pass,
# !! producing a MalformedInputException / Invalid plugin.yml at server startup.
# !! This is safe because every kept class (e.g. FakePlayerPlugin) retains its
# !! original name, so no YAML file ever needs a class-name reference updated.
-adaptresourcefilecontents **.properties

# ── Suppress noise from optional/missing soft-dependency classes ───────────────
-dontnote **
-dontwarn **
