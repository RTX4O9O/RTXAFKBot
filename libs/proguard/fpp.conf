# ProGuard configuration for FakePlayerPlugin
# injars / outjars are supplied on the command line by Maven exec plugin.
# Relative paths here are resolved relative to this config file's directory (libs/proguard/).

# Paper + NMS (one level up from libs/proguard/)
-libraryjars ../paper-1.21.11-mojang-mapped.jar

# LuckPerms, PlaceholderAPI, Authlib
-libraryjars ../api-5.5.jar
-libraryjars ../placeholderapi-2.11.6.jar
-libraryjars ../authlib-4.0.43.jar

# Keep the main plugin class (required by plugin.yml)
-keep public class me.bill.fakePlayerPlugin.FakePlayerPlugin {
    public *;
}

# Keep FakeServerGamePacketListenerImpl — extends NMS ServerGamePacketListenerImpl
-keep public class me.bill.fakePlayerPlugin.fakeplayer.network.FakeServerGamePacketListenerImpl {
    public *;
}

# Keep FakeChannel — extends Netty AbstractChannel
-keep public class me.bill.fakePlayerPlugin.fakeplayer.network.FakeChannel {
    public *;
}

# Keep FakeChannelPipeline — extends Netty DefaultChannelPipeline
-keep public class me.bill.fakePlayerPlugin.fakeplayer.network.FakeChannelPipeline {
    public *;
}

# Keep Bukkit event listener on* methods (called via reflection by Bukkit)
-keepclassmembers class * implements org.bukkit.event.Listener {
    public void on*(...);
}

# Keep all enum values and their names (used in config parsing)
-keepclassmembers enum * {
    public static **[] values();
    public static ** valueOf(java.lang.String);
}

# Keep exception classes
-keep public class * extends java.lang.Exception

# Obfuscation options
-dontusemixedcaseclassnames
-dontskipnonpubliclibraryclasses
-dontskipnonpubliclibraryclassmembers
-verbose

# Skip optimisation pass
-dontoptimize

# Adapt resource file names to match obfuscated class names
-adaptresourcefilenames
-adaptresourcefilecontents **.yml,**.properties

# Suppress notes/warnings about missing classes from optional soft-deps
-dontnote **
-dontwarn **




