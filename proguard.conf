# ══════════════════════════════════════════════════════════════════════════════
#  FakePlayerPlugin ProGuard Configuration
#  Obfuscates internal implementation while keeping public API intact
# ══════════════════════════════════════════════════════════════════════════════

# ── General Options ───────────────────────────────────────────────────────────

-verbose
-dontshrink
-dontoptimize
-keepattributes *Annotation*,Signature,InnerClasses,EnclosingMethod

# Keep line numbers for stack traces
-keepattributes SourceFile,LineNumberTable

# Rename packages to obfuscated names
-repackageclasses 'me.bill.fpp.obf'
-allowaccessmodification

# ── Bukkit/Paper API ──────────────────────────────────────────────────────────

# Keep all Bukkit/Paper API classes completely untouched
-keep class org.bukkit.** { *; }
-keep class io.papermc.** { *; }
-keep class net.kyori.** { *; }
-keep class com.destroystokyo.** { *; }

# Keep all Mojang authlib (needed for skins)
-keep class com.mojang.authlib.** { *; }

# ── Plugin Entry Point ────────────────────────────────────────────────────────

# Main plugin class MUST be kept exactly as-is
-keep public class me.bill.fakePlayerPlugin.FakePlayerPlugin extends org.bukkit.plugin.java.JavaPlugin {
    public <init>();
    public void onEnable();
    public void onDisable();
    public <methods>;
}

# ── Commands ──────────────────────────────────────────────────────────────────

# Command interface and all implementations must be kept
-keep interface me.bill.fakePlayerPlugin.command.FppCommand { *; }
-keep class * implements me.bill.fakePlayerPlugin.command.FppCommand {
    public <init>(...);
    public <methods>;
}

# CommandManager (registered as CommandExecutor/TabCompleter)
-keep class me.bill.fakePlayerPlugin.command.CommandManager {
    public <init>(...);
    public <methods>;
}

# ── Event Listeners ───────────────────────────────────────────────────────────

# All listener classes (Bukkit scans for @EventHandler methods via reflection)
-keep class * implements org.bukkit.event.Listener {
    public <init>(...);
    @org.bukkit.event.EventHandler <methods>;
}

# ── Configuration ─────────────────────────────────────────────────────────────

# Config, Lang, BotNameConfig, BotMessageConfig (accessed via static methods)
-keep class me.bill.fakePlayerPlugin.config.** {
    public static <methods>;
    public <methods>;
}

-keep class me.bill.fakePlayerPlugin.lang.Lang {
    public static <methods>;
}

# ── PlaceholderAPI Expansion ──────────────────────────────────────────────────

# Keep PAPI expansion class (registered via reflection)
-keep class me.bill.fakePlayerPlugin.util.FppPlaceholderExpansion extends me.clip.placeholderapi.expansion.PlaceholderExpansion {
    public <init>();
    public <methods>;
}

# Keep PlaceholderAPI classes
-keep class me.clip.placeholderapi.** { *; }

# ── LuckPerms Integration ─────────────────────────────────────────────────────

# Keep LuckPerms API classes
-keep class net.luckperms.api.** { *; }

# ── Database & JDBC Drivers ───────────────────────────────────────────────────

# Keep SQLite and MySQL drivers (loaded via Class.forName)
-keep class org.sqlite.** { *; }
-keep class com.mysql.** { *; }

# Keep JDBC interfaces
-keep class java.sql.** { *; }

# ── NMS/Reflection Helpers ────────────────────────────────────────────────────

# PacketHelper uses heavy reflection — keep public methods
-keep class me.bill.fakePlayerPlugin.fakeplayer.PacketHelper {
    public static <methods>;
}

# NmsHelper (reflection-based NMS class loading)
-keep class me.bill.fakePlayerPlugin.fakeplayer.NmsHelper {
    public static <methods>;
}

# ── Public Managers & Core Classes ────────────────────────────────────────────

# FakePlayerManager (accessed by commands/listeners)
-keep class me.bill.fakePlayerPlugin.fakeplayer.FakePlayerManager {
    public <init>(...);
    public <methods>;
}

# FakePlayer domain object (stored in persistence, accessed by many subsystems)
-keep class me.bill.fakePlayerPlugin.fakeplayer.FakePlayer {
    public <init>(...);
    public <methods>;
}

# SkinProfile (immutable, passed around, stored in FakePlayer)
-keep class me.bill.fakePlayerPlugin.fakeplayer.SkinProfile {
    public <init>(...);
    public <methods>;
}

# SkinRepository singleton
-keep class me.bill.fakePlayerPlugin.fakeplayer.SkinRepository {
    public static <methods>;
    public <methods>;
}

# BotPersistence (YAML serialization via SnakeYAML)
-keep class me.bill.fakePlayerPlugin.fakeplayer.BotPersistence {
    public <init>(...);
    public <methods>;
}

# ── Permissions ───────────────────────────────────────────────────────────────

# Perm class (permission node constants accessed by commands)
-keep class me.bill.fakePlayerPlugin.permission.Perm {
    public static final java.lang.String *;
    public static <methods>;
}

# ── Utilities ─────────────────────────────────────────────────────────────────

# FppLogger (public static methods called everywhere)
-keep class me.bill.fakePlayerPlugin.util.FppLogger {
    public static <methods>;
}

# TextUtil (public static methods for text parsing)
-keep class me.bill.fakePlayerPlugin.util.TextUtil {
    public static <methods>;
}

# UpdateChecker (public API for async update checks)
-keep class me.bill.fakePlayerPlugin.util.UpdateChecker {
    public static <methods>;
}

# UpdateInfo inner class
-keep class me.bill.fakePlayerPlugin.util.UpdateChecker$UpdateInfo {
    public <fields>;
}

# TabListManager (instantiated by plugin main)
-keep class me.bill.fakePlayerPlugin.util.TabListManager {
    public <init>(...);
    public <methods>;
}

# ── FastStats ─────────────────────────────────────────────────────────────────

# FppMetrics (loaded at runtime, not shaded)
-keep class me.bill.fakePlayerPlugin.util.FppMetrics {
    public <init>();
    public <methods>;
}

# ── Enumerations ──────────────────────────────────────────────────────────────

# Keep all enums (used in config, persistence, etc.)
-keepclassmembers enum * {
    public static **[] values();
    public static ** valueOf(java.lang.String);
}

# ── Serialization ─────────────────────────────────────────────────────────────

# Keep serializable classes for SnakeYAML (used in bot persistence)
-keepclassmembers class * implements java.io.Serializable {
    static final long serialVersionUID;
    private static final java.io.ObjectStreamField[] serialPersistentFields;
    private void writeObject(java.io.ObjectOutputStream);
    private void readObject(java.io.ObjectInputStream);
    java.lang.Object writeReplace();
    java.lang.Object readResolve();
}

# ── SnakeYAML ─────────────────────────────────────────────────────────────────

# Keep SnakeYAML classes (Bukkit uses it for config loading)
-keep class org.yaml.snakeyaml.** { *; }

# ── Google Guava ──────────────────────────────────────────────────────────────

# Keep Guava classes (used by authlib PropertyMap)
-keep class com.google.common.** { *; }

# ── Warnings Suppression ──────────────────────────────────────────────────────

# Ignore warnings about missing classes (provided by server at runtime)
-dontwarn org.bukkit.**
-dontwarn io.papermc.**
-dontwarn net.kyori.**
-dontwarn com.destroystokyo.**
-dontwarn com.mojang.**
-dontwarn net.luckperms.**
-dontwarn me.clip.placeholderapi.**
-dontwarn org.slf4j.**
-dontwarn org.apache.logging.**

# Ignore javax annotations (not needed at runtime)
-dontwarn javax.annotation.**
-dontwarn org.jetbrains.annotations.**

# ══════════════════════════════════════════════════════════════════════════════
#  Obfuscation Strategy:
#    • All public API classes/methods are kept as-is (commands, listeners, etc.)
#    • Internal implementation classes are obfuscated and repackaged
#    • Line numbers preserved for stack trace debugging
#    • No optimization/shrinking to avoid runtime issues
# ══════════════════════════════════════════════════════════════════════════════


