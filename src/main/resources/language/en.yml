# ─────────────────────────────────────────────────────────────────────────────
#  ꜰᴀᴋᴇ ᴘʟᴀʏᴇʀ ᴘʟᴜɢɪɴ  ·  language/en.yml
#  English language file — edit and run /fpp reload to apply changes.
#
#  Colour format : MiniMessage tags
#    Named colours  : <red>, <gray>, <white>, <dark_gray>, <yellow> …
#    Hex colours    : <#0079FF>text</#0079FF>
#    Decorations    : <bold>, <italic>, <underlined>, <strikethrough>
#    Reset          : <reset>
#  Placeholders : {placeholder} — see each entry for available ones
#
#  ⚠  Keys marked "INTERNAL — do not edit" are used by the plugin's layout
#     engine. Changing them will break formatting.
# ─────────────────────────────────────────────────────────────────────────────

# ── Plugin prefix — prepended to all [FPP] messages ──────────────────────────
#  Feel free to change the colour/text, but keep it short.
prefix: "<dark_gray>[<#0079FF>ꜰᴘᴘ</#0079FF><dark_gray>]<reset> "

# ─────────────────────────────────────────────────────────────────────────────
#  INTERNAL LAYOUT STRINGS — do not remove or rename these keys.
#  You may adjust colours/characters but keep the structure intact.
# ─────────────────────────────────────────────────────────────────────────────

# Horizontal rule used in headers and footers
divider: "<dark_gray><st>━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</st>"

# Help menu — INTERNAL (placeholders {cmd}, {args}, {desc} required)
help-header: "<dark_gray><st>━━━━━━━━━</st> <#0079FF><bold>ꜰᴀᴋᴇ ᴘʟᴀʏᴇʀ ᴘʟᴜɢɪɴ</#0079FF> <dark_gray><st>━━━━━━━━━</st>"
help-entry:  "  <#0079FF>/{cmd}</#0079FF><gray> {args} <dark_gray>— <white>{desc}"
help-footer: "<dark_gray><st>━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</st>"

# Plugin info screen (/fpp bare) — INTERNAL header line
info-screen-header: "  <#0079FF><bold>ꜰᴀᴋᴇ ᴘʟᴀʏᴇʀ ᴘʟᴜɢɪɴ</#0079FF> <dark_gray>· <gray>ꜰᴘᴘ"

# Modrinth page — URL is hardcoded in the plugin; only the label is shown to players
modrinth-label: "ᴍᴏᴅʀɪɴᴛʜ"

# ─────────────────────────────────────────────────────────────────────────────
#  PLAYER-FACING MESSAGES — safe to edit freely
# ─────────────────────────────────────────────────────────────────────────────

# ── Generic errors ────────────────────────────────────────────────────────────
no-permission:  "{prefix}<red>ʏᴏᴜ ᴅᴏɴ'ᴛ ʜᴀᴠᴇ ᴘᴇʀᴍɪꜱꜱɪᴏɴ ᴛᴏ ᴅᴏ ᴛʜɪꜱ."
unknown-command: "{prefix}<red>ᴜɴᴋɴᴏᴡɴ ꜱᴜʙ-ᴄᴏᴍᴍᴀɴᴅ. <gray>ᴛʀʏ <#0079FF>/{0} ʜᴇʟᴘ</#0079FF><gray> ꜰᴏʀ ᴀ ʟɪꜱᴛ."
player-only:    "{prefix}<red>ᴏɴʟʏ ᴀ ᴘʟᴀʏᴇʀ ᴄᴀɴ ʀᴜɴ ᴛʜɪꜱ ᴄᴏᴍᴍᴀɴᴅ."
invalid-number: "{prefix}<red>ɪɴᴠᴀʟɪᴅ ɴᴜᴍʙᴇʀ. ᴘʟᴇᴀꜱᴇ ᴇɴᴛᴇʀ ᴀ ᴘᴏꜱɪᴛɪᴠᴇ ɪɴᴛᴇɢᴇʀ."
console-only:   "{prefix}<red>ᴛʜɪꜱ ᴄᴏᴍᴍᴀɴᴅ ᴄᴀɴ ᴏɴʟʏ ʙᴇ ʀᴜɴ ꜰʀᴏᴍ ᴛʜᴇ ᴄᴏɴꜱᴏʟᴇ."

# ── Reload ────────────────────────────────────────────────────────────────────
# {ms} — milliseconds the reload took
reload-success: "{prefix}<#0079FF>ᴄᴏɴꜰɪɡ</#0079FF> <gray>ʀᴇʟᴏᴀᴅᴇᴅ <white>ꜱᴜᴄᴄᴇꜱꜱꜰᴜʟʟʏ <dark_gray>(<#0079FF>{ms}ᴍꜱ</#0079FF><dark_gray>)<gray>."
reload-failed:  "{prefix}<red>ʀᴇʟᴏᴀᴅ ꜰᴀɪʟᴇᴅ. <gray>ᴄʜᴇᴄᴋ ᴛʜᴇ ꜱᴇʀᴠᴇʀ ʟᴏɡꜱ ꜰᴏʀ ᴅᴇᴛᴀɪʟꜱ."

# ── Spawn ─────────────────────────────────────────────────────────────────────
# {count}  — number of bots spawned
# {total}  — total bots now active
# {name}   — custom bot name (name-taken / invalid-name errors)
# {max}    — max bot limit   (max-reached error)
# {limit}  — personal limit  (user-limit-reached error)
spawn-success:            "{prefix}<#0079FF>{count}</#0079FF> <gray>ꜰᴀᴋᴇ ᴘʟᴀʏᴇʀ(ꜱ) <white>ꜱᴜᴍᴍᴏɴᴇᴅ<gray>. <dark_gray>(<#0079FF>{total}</#0079FF> <gray>ᴀᴄᴛɪᴠᴇ<dark_gray>)"
spawn-max-reached:        "{prefix}<red>ᴍᴀx ʙᴏᴛ ʟɪᴍɪᴛ ʀᴇᴀᴄʜᴇᴅ <dark_gray>(<#0079FF>{max}</#0079FF> <gray>ʙᴏᴛꜱ<dark_gray>)<red>. ᴅᴇʟᴇᴛᴇ ꜱᴏᴍᴇ ꜰɪʀꜱᴛ."
spawn-user-limit-reached: "{prefix}<red>ʏᴏᴜ'ᴠᴇ ʀᴇᴀᴄʜᴇᴅ ʏᴏᴜʀ ᴘᴇʀꜱᴏɴᴀʟ ʙᴏᴛ ʟɪᴍɪᴛ <dark_gray>(<#0079FF>{limit}</#0079FF> <gray>ʙᴏᴛ(ꜱ)<dark_gray>)<red>."
spawn-invalid:            "{prefix}<red>ɪɴᴠᴀʟɪᴅ ᴜꜱᴀɢᴇ. <gray>ᴛʀʏ <#0079FF>/fpp spawn [amount] [--name <name>]</#0079FF><gray>."
spawn-invalid-name:       "{prefix}<red>ɪɴᴠᴀʟɪᴅ ʙᴏᴛ ɴᴀᴍᴇ. <gray>ᴜꜱᴇ <white>1–16 <gray>ᴄʜᴀʀꜱ <dark_gray>(<white>ʟᴇᴛᴛᴇʀꜱ<gray>, <white>ᴅɪɡɪᴛꜱ<gray>, <white>_<dark_gray>)<gray>."
spawn-name-taken:         "{prefix}<red>ᴀ ʙᴏᴛ ɴᴀᴍᴇᴅ <white>{name} <red>ɪꜱ ᴀʟʀᴇᴀᴅʏ ᴀᴄᴛɪᴠᴇ."
spawn-no-names-left:      "{prefix}<red>ᴀʟʟ ɴᴀᴍᴇꜱ ɪɴ ᴛʜᴇ ᴘᴏᴏʟ ᴀʀᴇ ɪɴ ᴜꜱᴇ. <gray>ʀᴇᴅᴜᴄᴇ ᴀᴄᴛɪᴠᴇ ʙᴏᴛꜱ ᴏʀ ᴀᴅᴅ ᴍᴏʀᴇ ɴᴀᴍᴇꜱ."

# ── Delete ────────────────────────────────────────────────────────────────────
# {name}  — bot name
# {count} — bots deleted (delete all)
delete-success:       "{prefix}<#0079FF>{name}</#0079FF> <gray>ʜᴀꜱ ʙᴇᴇɴ <white>ᴅɪꜱᴄᴏɴɴᴇᴄᴛᴇᴅ<gray>."
delete-all:           "{prefix}<#0079FF>{count}</#0079FF> <gray>ꜰᴀᴋᴇ ᴘʟᴀʏᴇʀ(ꜱ) <white>ᴅɪꜱᴄᴏɴɴᴇᴄᴛᴇᴅ<gray>."
delete-none:          "{prefix}<red>ɴᴏ ʙᴏᴛꜱ ᴀʀᴇ ᴄᴜʀʀᴇɴᴛʟʏ ᴀᴄᴛɪᴠᴇ."
delete-not-found:     "{prefix}<red>ɴᴏ ᴀᴄᴛɪᴠᴇ ʙᴏᴛ ɴᴀᴍᴇᴅ <white>{name}<red> ᴡᴀꜱ ꜰᴏᴜɴᴅ."
delete-no-perm-other: "{prefix}<red>ʏᴏᴜ ᴄᴀɴ ᴏɴʟʏ ᴅᴇʟᴇᴛᴇ <white>ʏᴏᴜʀ ᴏᴡɴ<red> ʙᴏᴛꜱ."

# ── List ──────────────────────────────────────────────────────────────────────
# {count} — active bot count  |  {max} — max bot limit
# {name}, {world}, {x}, {y}, {z} — per-bot placeholders
list-header: "{prefix}<gray>ᴀᴄᴛɪᴠᴇ ʙᴏᴛꜱ <dark_gray>(<#0079FF>{count}</#0079FF><dark_gray>/<#0079FF>{max}</#0079FF><dark_gray>)"
list-entry:  "  <#0079FF>•</#0079FF> <white>{name} <dark_gray>— <gray>{world} <dark_gray>@ <gray>{x}, {y}, {z}"
list-none:   "  <gray>ɴᴏ ʙᴏᴛꜱ ᴀʀᴇ ᴄᴜʀʀᴇɴᴛʟʏ ᴀᴄᴛɪᴠᴇ."

# ── Bot broadcast messages ────────────────────────────────────────────────────
# {name}   — bot display name
# {killer} — killer player name  (bot-kill only)
bot-join:  "<yellow>{name} joined the game"
bot-leave: "<yellow>{name} left the game"
bot-kill:  "<gray>{killer} <white>slain <gray>{name}"

# ── Respawn broadcast ─────────────────────────────────────────────────────────
# {name} — bot display name
bot-respawn: "{prefix}<gray>ʙᴏᴛ <#0079FF>{name}</#0079FF> <gray>ᴡɪʟʟ ʀᴇꜱᴘᴀᴡɴ ꜱʜᴏʀᴛʟʏ."

# ── Swap ──────────────────────────────────────────────────────────────────────
swap-enabled:    "{prefix}<#0079FF>ʙᴏᴛ ꜱᴡᴀᴘ</#0079FF> <gray>ʜᴀꜱ ʙᴇᴇɴ <white>ᴇɴᴀʙʟᴇᴅ<gray>."
swap-disabled:   "{prefix}<#0079FF>ʙᴏᴛ ꜱᴡᴀᴘ</#0079FF> <gray>ʜᴀꜱ ʙᴇᴇɴ <white>ᴅɪꜱᴀʙʟᴇᴅ<gray>."
swap-status-on:  "{prefix}<#0079FF>ʙᴏᴛ ꜱᴡᴀᴘ</#0079FF> <gray>ɪꜱ <white>ᴇɴᴀʙʟᴇᴅ<gray>."
swap-status-off: "{prefix}<#0079FF>ʙᴏᴛ ꜱᴡᴀᴘ</#0079FF> <gray>ɪꜱ <white>ᴅɪꜱᴀʙʟᴇᴅ<gray>."
swap-invalid:    "{prefix}<red>ᴜꜱᴀɢᴇ<gray>: <#0079FF>/fpp swap <on|off|status></#0079FF><gray>."

# ── Fake chat ─────────────────────────────────────────────────────────────────
chat-enabled:    "{prefix}<#0079FF>ꜰᴀᴋᴇ ᴄʜᴀᴛ</#0079FF> <gray>ʜᴀꜱ ʙᴇᴇɴ <white>ᴇɴᴀʙʟᴇᴅ<gray>."
chat-disabled:   "{prefix}<#0079FF>ꜰᴀᴋᴇ ᴄʜᴀᴛ</#0079FF> <gray>ʜᴀꜱ ʙᴇᴇɴ <white>ᴅɪꜱᴀʙʟᴇᴅ<gray>."
chat-status-on:  "{prefix}<#0079FF>ꜰᴀᴋᴇ ᴄʜᴀᴛ</#0079FF> <gray>ɪꜱ <white>ᴇɴᴀʙʟᴇᴅ<gray>."
chat-status-off: "{prefix}<#0079FF>ꜰᴀᴋᴇ ᴄʜᴀᴛ</#0079FF> <gray>ɪꜱ <white>ᴅɪꜱᴀʙʟᴇᴅ<gray>."
chat-invalid:    "{prefix}<red>ᴜꜱᴀɢᴇ<gray>: <#0079FF>/fpp chat <on|off|status></#0079FF><gray>."

# ── Info / database ───────────────────────────────────────────────────────────
# {name} — bot or spawner name queried
info-no-records:     "{prefix}<red>ɴᴏ ʀᴇᴄᴏʀᴅꜱ ꜰᴏᴜɴᴅ ꜰᴏʀ <white>{name}<red>."
info-db-unavailable: "{prefix}<red>ᴅᴀᴛᴀʙᴀꜱᴇ ᴜɴᴀᴠᴀɪʟᴀʙʟᴇ. ᴄʜᴇᴄᴋ ʏᴏᴜʀ ᴄᴏɴꜰɪɡ ᴀɴᴅ ꜱᴇʀᴠᴇʀ ʟᴏɡꜱ."
info-no-bots:        "{prefix}<red>ʏᴏᴜ ʜᴀᴠᴇ ɴᴏ ᴀᴄᴛɪᴠᴇ ʙᴏᴛꜱ."

# ── Teleport ──────────────────────────────────────────────────────────────────
# {name} — bot name
tph-success:      "{prefix}<gray>ᴛᴇʟᴇᴘᴏʀᴛᴇᴅ <#0079FF>{name}</#0079FF> <gray>ᴛᴏ ʏᴏᴜ."
tph-no-bots:      "{prefix}<red>ʏᴏᴜ ʜᴀᴠᴇ ɴᴏ ᴀᴄᴛɪᴠᴇ ʙᴏᴛꜱ."
tph-specify-name: "{prefix}<red>ʏᴏᴜ ʜᴀᴠᴇ ᴍᴜʟᴛɪᴘʟᴇ ʙᴏᴛꜱ. <gray>ꜱᴘᴇᴄɪꜰʏ ᴏɴᴇ: <#0079FF>/fpp tph <botname></#0079FF>"
tph-not-yours:    "{prefix}<red>ʏᴏᴜ ᴅᴏɴ'ᴛ ᴏᴡɴ ᴀ ʙᴏᴛ ɴᴀᴍᴇᴅ <white>{name}<red>."
tph-not-found:    "{prefix}<red>ɴᴏ ᴀᴄᴛɪᴠᴇ ʙᴏᴛ ɴᴀᴍᴇᴅ <white>{name}<red>."
tph-failed:       "{prefix}<red>ᴄᴏᴜʟᴅ ɴᴏᴛ ᴛᴇʟᴇᴘᴏʀᴛ <white>{name}<red> — ᴇɴᴛɪᴛʏ ɪɴᴠᴀʟɪᴅ."
tp-success:       "{prefix}<gray>ᴛᴇʟᴇᴘᴏʀᴛᴇᴅ ᴛᴏ <#0079FF>{name}</#0079FF><gray>."
tp-specify-name:  "{prefix}<red>ᴍᴜʟᴛɪᴘʟᴇ ʙᴏᴛꜱ ᴀᴄᴛɪᴠᴇ. <gray>ꜱᴘᴇᴄɪ꜕ʏ ᴏɴᴇ: <#0079FF>/fpp tp <botname></#0079FF>"
tp-not-found:     "{prefix}<red>ɴᴏ ᴀᴄᴛɪᴠᴇ ʙᴏᴛ ɴᴀᴍᴇᴅ <white>{name}<red>."
tp-failed:        "{prefix}<red>ᴄᴏᴜʟᴅ ɴᴏᴛ ᴛᴇʟᴇᴘᴏʀᴛ ᴛᴏ <white>{name}<red> — ᴇɴᴛɪᴛʏ ɪɴᴠᴀʟɪᴅ."

# ── Update checker ────────────────────────────────────────────────────────────
# {current} — installed version  |  {latest} — latest version
update-available:  "{prefix}<#0079FF>ᴜᴘᴅᴀᴛᴇ ᴀᴠᴀɪʟᴀʙʟᴇ</#0079FF><gray>: <white>v{current} <gray>→ <white>v{latest}<gray>."
update-up-to-date: "{prefix}<gray>ᴘʟᴜɢɪɴ ɪꜱ ᴜᴘ ᴛᴏ ᴅᴀᴛᴇ <dark_gray>(<#0079FF>v{current}</#0079FF><dark_gray>)<gray>."
update-failed:     "{prefix}<gray>ᴄᴏᴜʟᴅ ɴᴏᴛ ᴄʜᴇᴄᴋ ꜰᴏʀ ᴜᴘᴅᴀᴛᴇꜱ."

# In-game compatibility warning shown to admins when the server/runtime is restricted
compatibility-warning: "{prefix}<white>Not fully supported — some features disabled.</white>"

# ── Freeze ────────────────────────────────────────────────────────────────────
# {name}  — bot display name  |  {count} — number of bots (all)
freeze-usage:         "{prefix}<red>ᴜꜱᴀɢᴇ<gray>: <#0079FF>/fpp freeze <bot|all> [on|off]</#0079FF><gray>."
freeze-not-found:     "{prefix}<red>ɴᴏ ᴀᴄᴛɪᴠᴇ ʙᴏᴛ ɴᴀᴍᴇᴅ <white>{name}<red>."
freeze-frozen:        "{prefix}<#66CCFF>❄</#66CCFF> <#0079FF>{name}</#0079FF> <gray>ɪꜱ ɴᴏᴡ <white>ꜰʀᴏᴢᴇɴ<gray>."
freeze-unfrozen:      "{prefix}<#0079FF>{name}</#0079FF> <gray>ɪꜱ ɴᴏᴡ <white>ᴜɴꜰʀᴏᴢᴇɴ<gray>."
freeze-all-frozen:    "{prefix}<#66CCFF>❄</#66CCFF> <#0079FF>{count}</#0079FF> <gray>ʙᴏᴛ(ꜱ) ꜰʀᴏᴢᴇɴ<gray>."
freeze-all-unfrozen:  "{prefix}<#0079FF>{count}</#0079FF> <gray>ʙᴏᴛ(ꜱ) ᴜɴꜰʀᴏᴢᴇɴ<gray>."


# ── Spawn cooldown ────────────────────────────────────────────────────────────
# {seconds} — seconds remaining on cooldown
spawn-cooldown: "{prefix}<red>ᴘʟᴇᴀꜱᴇ ᴡᴀɪᴛ <white>{seconds}s<red> ʙᴇꜰᴏʀᴇ ꜱᴘᴀᴡɴɪɴɢ ᴀɢᴀɪɴ."

