# ─────────────────────────────────────────────────────────────────────────────
#  ꜰᴀᴋᴇ ᴘʟᴀʏᴇʀ ᴘʟᴜɢɪɴ  ·  language/en.yml
#  English language file — edit and run /fpp reload to apply changes.
#
#  Colour format : MiniMessage tags
#    Named colours  : <red>, <gray>, <white>, <dark_gray>, <yellow> …
#    Hex colours    : <#0079FF>text</#0079FF>
#    Decorations    : <bold>, <italic>, <underlined>, <strikethrough>
#    Reset          : <reset>
#  Placeholders : {placeholder} — see each entry for available ones
#
#  ⚠  Keys marked "INTERNAL — do not edit" are used by the plugin's layout
#     engine. Changing them will break formatting.
# ─────────────────────────────────────────────────────────────────────────────

# ── Plugin prefix — prepended to all [FPP] messages ──────────────────────────
#  Feel free to change the colour/text, but keep it short.
prefix: "<dark_gray>[<#0079FF>ꜰᴘᴘ</#0079FF><dark_gray>]<reset> "

# ─────────────────────────────────────────────────────────────────────────────
#  INTERNAL LAYOUT STRINGS — do not remove or rename these keys.
#  You may adjust colours/characters but keep the structure intact.
# ─────────────────────────────────────────────────────────────────────────────

# Horizontal rule used in headers and footers
divider: "<dark_gray><st>━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</st>"

# Help menu — INTERNAL (placeholders {cmd}, {args}, {desc} required)
