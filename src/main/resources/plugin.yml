name: FakePlayerPlugin
version: '1.5.15'
main: me.bill.fakePlayerPlugin.FakePlayerPlugin
api-version: '1.21'
authors: [ El_Pepes ]
description: "Advanced Fake Player Spoofer for Paper 1.21+"
website: "https://modrinth.com/plugin/fake-player-plugin-(fpp)"
softdepend: [ PlaceholderAPI, LuckPerms, WorldGuard ]

commands:
  fpp:
    description: Fake Player Plugin main command
    usage: /fpp [sub-command]
    aliases: [ fakeplayer, fp ]

# ══════════════════════════════════════════════════════════════════════════════
#                           PERMISSION SYSTEM
# ══════════════════════════════════════════════════════════════════════════════
# All permissions are auto-discovered by LuckPerms for tab-completion.
# To grant permissions:
#   /lp user <username> permission set <permission> true
#   /lp group <groupname> permission set <permission> true
#
# Examples:
#   Grant admin access:      /lp group admin permission set fpp.* true
#   Grant user access:       /lp user PlayerName permission set fpp.user.* true
#   Set bot limit to 5:      /lp user PlayerName permission set fpp.bot.5 true
#   Bypass spawn cooldown:   /lp user VIP permission set fpp.bypass.cooldown true
#
# Permission hierarchy:
#   fpp.*         → Full admin (includes all commands below)
#   fpp.user.*    → User tier (spawn, tph, info-self) — default: everyone
#   fpp.bot.<num> → Personal bot limit (1-100) — default: fpp.bot.1
# ══════════════════════════════════════════════════════════════════════════════

permissions:

  # ── Admin wildcard ─────────────────────────────────────────────────────────
  # Grants EVERYTHING — assign to owner / admin groups only
  fpp.*:
    description: Grants access to all FPP commands and features (admin).
    default: op
    children:
      fpp.help:             true
      fpp.spawn:            true
      fpp.spawn.multiple:   true
      fpp.spawn.name:       true
      fpp.delete:           true
      fpp.delete.all:       true
      fpp.list:             true
      fpp.chat:             true
      fpp.reload:           true
      fpp.info:             true
      fpp.tp:               true
      fpp.bypass.maxbots:   true
      fpp.bypass.cooldown:  true
      fpp.bypass.*:         true
      fpp.admin.migrate:    true
      fpp.stats:            true
      fpp.freeze:           true
      fpp.lpinfo:           true
      fpp.rank:             true
      fpp.alert:            true
      fpp.sync:             true
      fpp.swap:             true
      fpp.peaks:            true
      fpp.settings:         true
      fpp.user.*:           true

  # ── User wildcard ──────────────────────────────────────────────────────────
  # default: true  →  ALL players get user-tier access out of the box.
  # Use LuckPerms to negate it for specific groups if needed:
  #   /lp group guest permission set fpp.user.* false
  fpp.user.*:
    description: >
      Grants all user-facing FPP commands to regular players (default: everyone).
      Includes: spawn (1-bot limit), /fpp tph, /fpp info (own bots only).
      Does NOT include admin commands (delete, reload, chat, list, full-info, tp).
    default: true
    children:
      fpp.user.spawn: true
      fpp.user.tph:   true
      fpp.user.info:  true
      fpp.bot.1:      true   # default personal limit — 1 bot per player

  # ── User commands ──────────────────────────────────────────────────────────

  fpp.user.spawn:
    description: >
      Spawn bots up to the player's personal bot limit.
      Limit is resolved from fpp.bot.<num> nodes (highest wins).
      Falls back to fake-player.user-bot-limit in config.yml (default: 1).
      Cannot use --name or spawn multiple bots (admin-only features).
    default: true

  fpp.user.tph:
    description: >
      Teleport your own bot(s) to you with /fpp tph [botname].
      Players can only tph bots they personally spawned.
      If you have 1 bot, botname is optional.
      If you have multiple bots, you must specify one by name.
    default: true

  fpp.user.info:
    description: >
      View limited bot info with /fpp info [botname] — own bots only.
      Shows: world, coordinates, uptime.
      Does NOT show session history, database records, or other players' bots.
    default: true

  # ── Bot limit nodes ────────────────────────────────────────────────────────
  # Assign the highest node the player should be allowed.
  # The plugin scans fpp.bot.1 → fpp.bot.100 and picks the highest match.
  # fpp.bot.1 is already included in fpp.user.* (1-bot default for all players).
  fpp.bot.1:
    description: Personal bot limit — 1 active bot at a time. Included in fpp.user.*.
    default: false   # granted automatically via fpp.user.* (default: true)
  fpp.bot.2:
    description: Personal bot limit — 2 active bots at a time.
    default: false
  fpp.bot.3:
    description: Personal bot limit — 3 active bots at a time.
    default: false
  fpp.bot.5:
    description: Personal bot limit — 5 active bots at a time.
    default: false
  fpp.bot.10:
    description: Personal bot limit — 10 active bots at a time.
    default: false
  fpp.bot.15:
    description: Personal bot limit — 15 active bots at a time.
    default: false
  fpp.bot.20:
    description: Personal bot limit — 20 active bots at a time.
    default: false
  fpp.bot.50:
    description: Personal bot limit — 50 active bots at a time.
    default: false
  fpp.bot.100:
    description: Personal bot limit — 100 active bots at a time.
    default: false

  # ── Help ──────────────────────────────────────────────────────────────────
  fpp.help:
    description: View the /fpp help menu. Granted to everyone by default.
    default: true

  # ── Spawn (admin) ─────────────────────────────────────────────────────────
  # Admin spawn ignores personal bot limits entirely.
  fpp.spawn:
    description: >
      Admin spawn — /fpp spawn [amount] [--name <name>].
      No personal bot limit. Automatically grants fpp.spawn.multiple and fpp.spawn.name.
    default: op
    children:
      fpp.spawn.multiple: true
      fpp.spawn.name:     true

  fpp.spawn.multiple:
    description: >
      Spawn more than one bot at a time (/fpp spawn <amount>).
      Negate to restrict a group to single-bot spawning even with fpp.spawn.
    default: op

  fpp.spawn.name:
    description: >
      Use the --name flag to spawn a bot with a custom name.
      User-tier (fpp.user.spawn) cannot use this — admin only.
    default: op

  # ── Delete ────────────────────────────────────────────────────────────────
  fpp.delete:
    description: Despawn a fake player by name with /fpp despawn <name>.
    default: op
    children:
      fpp.delete.all: true

  fpp.delete.all:
    description: >
      Despawn ALL bots at once with /fpp despawn all.
      Negate to allow individual deletions without mass-wipe access.
    default: op

  # ── List ──────────────────────────────────────────────────────────────────
  fpp.list:
    description: List all active bots (name, uptime, location, spawner) with /fpp list.
    default: op

  # ── Chat ──────────────────────────────────────────────────────────────────
  fpp.chat:
    description: Toggle bot fake-chat on/off with /fpp chat [on|off|status].
    default: op

  # ── Reload ────────────────────────────────────────────────────────────────
  fpp.reload:
    description: Hot-reload all plugin config with /fpp reload. Restrict to trusted admins.
    default: op

  # ── Info (admin) ──────────────────────────────────────────────────────────
  fpp.info:
    description: >
      Full admin database query via /fpp info / /fpp info bot <name> / /fpp info spawner <name>.
      Shows session history, timestamps, locations, and removal reasons for ALL bots.
    default: op

  # ── Teleport ──────────────────────────────────────────────────────────────
  fpp.tp:
    description: >
      Teleport yourself to any active bot with /fpp tp [botname].
      Admin-only. User-tier players cannot use this — grant explicitly if needed.
    default: op

  # ── Bypass ────────────────────────────────────────────────────────────────
  # Grant fpp.bypass.* to give both bypass nodes at once (e.g. VIP/Staff groups).
  fpp.bypass.*:
    description: >
      Grants all FPP bypass permissions at once.
      Useful for VIP/Staff groups that should bypass both the global bot cap
      and the spawn cooldown. Automatically granted via fpp.*.
    default: op
    children:
      fpp.bypass.maxbots:  true
      fpp.bypass.cooldown: true

  fpp.bypass.maxbots:
    description: >
      Bypass the global max-bots cap in config.yml during /fpp spawn.
      Grant with care — no upper bound when active.
    default: op

  fpp.bypass.cooldown:
    description: >
      Bypass the spawn-cooldown delay for /fpp spawn.
      Grant to VIP players or staff who should not be rate-limited.
      Automatically granted to admins via fpp.* and fpp.bypass.*.
    default: op


  # ── Migration & Backup ────────────────────────────────────────────────────
  fpp.admin.migrate:
    description: >
      Access /fpp migrate — create backups, run config migrations, merge old databases,
      export session data to CSV, and migrate between SQLite and MySQL backends.
      Op-only by default. Grant only to trusted server administrators.
    default: op

  # Permission used to receive update notifications when a newer plugin version is available
  fakeplayer.notify:
    description: Receive update notifications from FakePlayerPlugin (ops always notified)
    default: op

  # ── Stats ─────────────────────────────────────────────────────────────────
  fpp.stats:
    description: >
      View the /fpp stats panel showing live bot counts, system status,
      database lifetime statistics, and server TPS.
    default: op

  # ── Freeze ────────────────────────────────────────────────────────────────
  fpp.freeze:
    description: >
      Freeze or unfreeze bots with /fpp freeze <bot|all> [on|off].
      Frozen bots are immovable and shown with an ❄ indicator in /fpp list.
    default: op



  # ── LuckPerms Info ────────────────────────────────────────────────────────
  fpp.lpinfo:
    description: >
      View LuckPerms diagnostic info for a bot with /fpp lpinfo <bot-name>.
      Shows: prefix, weight, rank, packet profile name, and group hierarchy.
      Useful for debugging tab-list ordering issues.
    default: op

  # ── Rank (LuckPerms Group Assignment) ─────────────────────────────────
  fpp.rank:
    description: >
      Assign LuckPerms groups to individual bots with /fpp rank.
      Subcommands: <bot> <group>, <bot> clear, random <group> [num], list.
      Allows mixing bot ranks (admin bots, VIP bots, default bots) on the same server.
    default: op

  # ── Alert (Network Broadcast) ─────────────────────────────────────────
  fpp.alert:
    description: >
      Broadcast network-wide alerts to all servers via /fpp alert <message>.
      Sends the alert to Velocity proxy which echoes it back to every backend server.
      Players and console on all connected servers will see the broadcast.
      Requires NETWORK mode and plugin messaging to be active.
    default: op

  # ── Sync (Config Synchronization) ─────────────────────────────────────
  fpp.sync:
    description: >
      Sync config files across network with /fpp sync <push|pull|status|check> [file].
      Requires NETWORK mode and MySQL connection.
      Subcommands: push <file|all>, pull <file|all>, check <file|all>, status.
    default: op

  # ── Swap (Session Rotation) ────────────────────────────────────────────────
  fpp.swap:
    description: >
      Control bot session rotation (swap in/out) with /fpp swap.
      When enabled, AFK bots periodically leave and rejoin the server,
      mimicking real player behaviour with random session + absence durations.
      Subcommands: on, off, status, now <bot>, list.
    default: op

  # ── Peak Hours (Time-based Pool Scheduling) ────────────────────────────────
  fpp.peaks:
    description: >
      Control peak-hours bot pool management with /fpp peaks.
      When enabled, the plugin automatically adjusts how many bots are online
      based on real-world time windows (morning, evening, night, weekends, etc.),
      mimicking natural player activity patterns.
      Requires swap.enabled: true (auto-enabled by default).
      Subcommands: on, off, status, next, force, list, wake [name], sleep <name>.
    default: op

  # ── Settings GUI ────────────────────────────────────────────────────────────
  fpp.settings:
    description: >
      Open the interactive settings GUI with /fpp settings.
      Lets admins toggle and configure plugin settings in-game
      without editing config.yml directly.
      Changes are applied and saved immediately on click.
    default: op

