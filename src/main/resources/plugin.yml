name: FakePlayerPlugin
version: '1.6.2'
main: me.bill.fakePlayerPlugin.FakePlayerPlugin
api-version: '1.21'
authors: [ El_Pepes ]
description: "Advanced Fake Player Spoofer for Paper 1.21+"
website: "https://modrinth.com/plugin/fake-player-plugin-(fpp)"
softdepend: [ PlaceholderAPI, LuckPerms, WorldGuard ]

commands:
  fpp:
    description: Fake Player Plugin main command
    usage: /fpp [sub-command]
    aliases: [ fakeplayer, fp ]
    permission-message: ''

# ══════════════════════════════════════════════════════════════════════════════
#                           PERMISSION SYSTEM
# ══════════════════════════════════════════════════════════════════════════════
# All permissions are auto-discovered by LuckPerms for tab-completion.
# To grant permissions:
#   /lp user <username> permission set <permission> true
#   /lp group <groupname> permission set <permission> true
#
# Examples:
#   Grant full admin access:  /lp group admin permission set fpp.op true
#   Grant user access:        /lp user PlayerName permission set fpp.use true
#   Set bot limit to 5:       /lp user PlayerName permission set fpp.spawn.limit.5 true
#   Bypass spawn cooldown:    /lp user VIP permission set fpp.bypass.cooldown true
#
# Permission hierarchy:
#   fpp.op                → Full admin (includes all commands below)
#   fpp.use               → User tier (spawn, tph, xp, info-self) — default: everyone
#   fpp.spawn.limit.<num> → Personal bot limit (1-100) — default: fpp.spawn.limit.1
# ══════════════════════════════════════════════════════════════════════════════

permissions:

  # ── Admin wildcard ─────────────────────────────────────────────────────────
  # Grants EVERYTHING — assign to owner / admin groups only
  fpp.op:
    description: Grants access to all FPP commands and features (admin).
    default: op
    children:
      fpp.command:          true
      fpp.plugininfo:       true
      fpp.help:             true
      fpp.spawn:            true
      fpp.spawn.multiple:   true
      fpp.spawn.name:       true
      fpp.delete:           true
      fpp.delete.all:       true
      fpp.list:             true
      fpp.chat:             true
      fpp.reload:           true
      fpp.info:             true
      fpp.tp:               true
      fpp.bypass.max:       true
      fpp.bypass.cooldown:  true
      fpp.migrate:          true
      fpp.stats:            true
      fpp.freeze:           true
      fpp.lpinfo:           true
      fpp.rank:             true
      fpp.alert:            true
      fpp.sync:             true
      fpp.swap:             true
      fpp.peaks:            true
      fpp.settings:         true
      fpp.move:             true
      fpp.inventory:        true
      fpp.cmd:              true
      fpp.mine:             true
      fpp.storage:          true
      fpp.place:            true
      fpp.useitem:          true
      fpp.waypoint:         true
      fpp.badword:          true
      fpp.rename:           true
      fpp.rename.own:       true
      fpp.notify:           true
      fpp.personality:      true
      fpp.use:              true

  # ── Main command visibility ────────────────────────────────────────────────
  # Controls whether the /fpp command itself is visible and usable.
  # Default: true (everyone) — negate to completely hide /fpp from a group/player:
  #   /lp group guest permission set fpp.command false
  # When negated: /fpp produces no output and does not appear in tab-completion.
  fpp.command:
    description: >
      Allows use of the /fpp command (all sub-commands, tab-complete).
      Default: everyone. Negate to fully hide the FPP command from a player or group.
    default: true

  # ── Plugin info panel (bare /fpp) ─────────────────────────────────────────
  # Controls whether typing bare /fpp shows the full info panel.
  # Default: op — regular users just see the /fpp help hint instead.
  # Grant to non-OP staff who need visibility of version/status info:
  #   /lp user StaffPlayer permission set fpp.plugininfo true
  fpp.plugininfo:
    description: >
      Show the full plugin info panel when typing bare /fpp (version, author,
      active bots, download links, Discord). Default: op.
      Players without this see only a minimal /fpp help hint — they can still
      use all sub-commands they have permission for.
    default: op

  # ── User wildcard ──────────────────────────────────────────────────────────
  # default: true  →  ALL players get user-tier access out of the box.
  # Use LuckPerms to negate it for specific groups if needed:
  #   /lp group guest permission set fpp.use false
  fpp.use:
    description: >
      Grants all user-facing FPP commands to regular players (default: everyone).
      Includes: /fpp command access, /fpp help, spawn (1-bot limit), /fpp tph, /fpp xp,
      /fpp info (own bots only).
      Does NOT include admin commands (delete, reload, chat, list, full-info, tp, settings)
      and does NOT show the plugin info panel (requires fpp.plugininfo).
    default: true
    children:
      fpp.command:         true    # allows the /fpp command itself
      fpp.help:            true    # allows /fpp help
      fpp.spawn.user:      true
      fpp.tph:             true
      fpp.xp:              true
      fpp.info.user:       true
      fpp.spawn.limit.1:   true   # default personal limit — 1 bot per player

  # ── User commands ──────────────────────────────────────────────────────────

  fpp.spawn.user:
    description: >
      Spawn bots up to the player's personal bot limit.
      Limit is resolved from fpp.spawn.limit.<num> nodes (highest wins).
      Falls back to fake-player.user-bot-limit in config.yml (default: 1).
      Cannot use --name or spawn multiple bots (admin-only features).
    default: true

  fpp.tph:
    description: >
      Teleport your own bot(s) to you with /fpp tph [botname].
      Players can only tph bots they personally spawned.
      If you have 1 bot, botname is optional.
      If you have multiple bots, you must specify one by name.
    default: true

  fpp.xp:
    description: >
      Collect XP from your own bot(s) with /fpp xp <botname>.
      The bot's XP is transferred to you, and the bot cannot pick up XP for 30 seconds.
      Requires body.pick-up-xp: true in config.yml for bots to collect XP.
    default: true

  fpp.info.user:
    description: >
      View limited bot info with /fpp info [botname] — own bots only.
      Shows: world, coordinates, uptime.
      Does NOT show session history, database records, or other players' bots.
    default: true

  # ── Bot limit nodes ────────────────────────────────────────────────────────
  # Assign the highest node the player should be allowed.
  # The plugin scans fpp.spawn.limit.1 → fpp.spawn.limit.100 and picks the highest match.
  # fpp.spawn.limit.1 is already included in fpp.use (1-bot default for all players).
  fpp.spawn.limit.1:
    description: Personal bot limit — 1 active bot at a time. Included in fpp.use.
    default: false   # granted automatically via fpp.use (default: true)
  fpp.spawn.limit.2:
    description: Personal bot limit — 2 active bots at a time.
    default: false
  fpp.spawn.limit.3:
    description: Personal bot limit — 3 active bots at a time.
    default: false
  fpp.spawn.limit.4:
    description: Personal bot limit — 4 active bots at a time.
    default: false
  fpp.spawn.limit.5:
    description: Personal bot limit — 5 active bots at a time.
    default: false
  fpp.spawn.limit.6:
    description: Personal bot limit — 6 active bots at a time.
    default: false
  fpp.spawn.limit.7:
    description: Personal bot limit — 7 active bots at a time.
    default: false
  fpp.spawn.limit.8:
    description: Personal bot limit — 8 active bots at a time.
    default: false
  fpp.spawn.limit.9:
    description: Personal bot limit — 9 active bots at a time.
    default: false
  fpp.spawn.limit.10:
    description: Personal bot limit — 10 active bots at a time.
    default: false
  fpp.spawn.limit.15:
    description: Personal bot limit — 15 active bots at a time.
    default: false
  fpp.spawn.limit.20:
    description: Personal bot limit — 20 active bots at a time.
    default: false
  fpp.spawn.limit.25:
    description: Personal bot limit — 25 active bots at a time.
    default: false
  fpp.spawn.limit.30:
    description: Personal bot limit — 30 active bots at a time.
    default: false
  fpp.spawn.limit.40:
    description: Personal bot limit — 40 active bots at a time.
    default: false
  fpp.spawn.limit.50:
    description: Personal bot limit — 50 active bots at a time.
    default: false
  fpp.spawn.limit.75:
    description: Personal bot limit — 75 active bots at a time.
    default: false
  fpp.spawn.limit.100:
    description: Personal bot limit — 100 active bots at a time.
    default: false

  # ── Help ──────────────────────────────────────────────────────────────────
  fpp.help:
    description: View the /fpp help menu. Granted to everyone by default.
    default: true

  # ── Spawn (admin) ─────────────────────────────────────────────────────────
  # Admin spawn ignores personal bot limits entirely.
  fpp.spawn:
    description: >
      Admin spawn — /fpp spawn [amount] [--name <name>].
      No personal bot limit. Automatically grants fpp.spawn.multiple and fpp.spawn.name.
    default: op
    children:
      fpp.spawn.multiple: true
      fpp.spawn.name:     true

  fpp.spawn.multiple:
    description: >
      Spawn more than one bot at a time (/fpp spawn <amount>).
      Negate to restrict a group to single-bot spawning even with fpp.spawn.
    default: op

  fpp.spawn.name:
    description: >
      Use the --name flag to spawn a bot with a custom name.
      User-tier (fpp.user.spawn) cannot use this — admin only.
    default: op

  # ── Delete ────────────────────────────────────────────────────────────────
  fpp.delete:
    description: >
      Despawn fake players with /fpp despawn.
      Subcommands: <name> (by name), all (all bots — requires fpp.delete.all),
      --random [num] (despawn N random bots, default 1),
      --num <num> (despawn N bots in spawn order, oldest first).
    default: op
    children:
      fpp.delete.all: true

  fpp.delete.all:
    description: >
      Despawn ALL bots at once with /fpp despawn all.
      Negate to allow individual/random deletions without mass-wipe access.
    default: op

  # ── List ──────────────────────────────────────────────────────────────────
  fpp.list:
    description: List all active bots (name, uptime, location, spawner) with /fpp list.
    default: op

  # ── Chat ──────────────────────────────────────────────────────────────────
  fpp.chat:
    description: Toggle bot fake-chat on/off with /fpp chat [on|off|status].
    default: op

  # ── Reload ────────────────────────────────────────────────────────────────
  fpp.reload:
    description: Hot-reload all plugin config with /fpp reload. Restrict to trusted admins.
    default: op

  # ── Info (admin) ──────────────────────────────────────────────────────────
  fpp.info:
    description: >
      Full admin database query via /fpp info / /fpp info bot <name> / /fpp info spawner <name>.
      Shows session history, timestamps, locations, and removal reasons for ALL bots.
    default: op

  # ── Teleport ──────────────────────────────────────────────────────────────
  fpp.tp:
    description: >
      Teleport yourself to any active bot with /fpp tp [botname].
      Admin-only. User-tier players cannot use this — grant explicitly if needed.
    default: op

  # ── Bypass ────────────────────────────────────────────────────────────────

  fpp.bypass.max:
    description: >
      Bypass the global max-bots cap in config.yml during /fpp spawn.
      Grant with care — no upper bound when active.
    default: op

  fpp.bypass.cooldown:
    description: >
      Bypass the spawn-cooldown delay for /fpp spawn.
      Grant to VIP players or staff who should not be rate-limited.
      Automatically granted to admins via fpp.op.
    default: op


  # ── Migration & Backup ────────────────────────────────────────────────────
  fpp.migrate:
    description: >
      Access /fpp migrate — create backups, run config migrations, merge old databases,
      export session data to CSV, and migrate between SQLite and MySQL backends.
      Op-only by default. Grant only to trusted server administrators.
    default: op

  # ── Update notifications ──────────────────────────────────────────────────
  # Automatically granted to all fpp.op members.
  # Grant to non-OP server admins who should also receive update notifications on join.
  fpp.notify:
    description: >
      Receive plugin update notifications on join when a newer version is available.
      Automatically inherited by fpp.op. Grant explicitly to non-OP server staff.
    default: op

  # ── Stats ─────────────────────────────────────────────────────────────────
  fpp.stats:
    description: >
      View the /fpp stats panel showing live bot counts, system status,
      database lifetime statistics, and server TPS.
    default: op

  # ── Freeze ────────────────────────────────────────────────────────────────
  fpp.freeze:
    description: >
      Freeze or unfreeze bots with /fpp freeze <bot|all> [on|off].
      Frozen bots are immovable and shown with an ❄ indicator in /fpp list.
    default: op



  # ── LuckPerms Info ────────────────────────────────────────────────────────
  fpp.lpinfo:
    description: >
      View LuckPerms diagnostic info for a bot with /fpp lpinfo <bot-name>.
      Shows: prefix, weight, rank, packet profile name, and group hierarchy.
      Useful for debugging tab-list ordering issues.
    default: op

  # ── Rank (LuckPerms Group Assignment) ─────────────────────────────────
  fpp.rank:
    description: >
      Assign LuckPerms groups to individual bots with /fpp rank.
      Subcommands: <bot> <group>, <bot> clear, random <group> [num], list.
      Allows mixing bot ranks (admin bots, VIP bots, default bots) on the same server.
    default: op

  # ── Alert (Network Broadcast) ─────────────────────────────────────────
  fpp.alert:
    description: >
      Broadcast network-wide alerts to all servers via /fpp alert <message>.
      Sends the alert to Velocity proxy which echoes it back to every backend server.
      Players and console on all connected servers will see the broadcast.
      Requires NETWORK mode and plugin messaging to be active.
    default: op

  # ── Sync (Config Synchronization) ─────────────────────────────────────
  fpp.sync:
    description: >
      Sync config files across network with /fpp sync <push|pull|status|check> [file].
      Requires NETWORK mode and MySQL connection.
      Subcommands: push <file|all>, pull <file|all>, check <file|all>, status.
    default: op

  # ── Swap (Session Rotation) ────────────────────────────────────────────────
  fpp.swap:
    description: >
      Control bot session rotation (swap in/out) with /fpp swap.
      When enabled, AFK bots periodically leave and rejoin the server,
      mimicking real player behaviour with random session + absence durations.
      Subcommands: on, off, status, now <bot>, list.
    default: op

  # ── Peak Hours (Time-based Pool Scheduling) ────────────────────────────────
  fpp.peaks:
    description: >
      Control peak-hours bot pool management with /fpp peaks.
      When enabled, the plugin automatically adjusts how many bots are online
      based on real-world time windows (morning, evening, night, weekends, etc.),
      mimicking natural player activity patterns.
      Requires swap.enabled: true (auto-enabled by default).
      Subcommands: on, off, status, next, force, list, wake [name], sleep <name>.
    default: op

  # ── Settings GUI ────────────────────────────────────────────────────────────
  fpp.settings:
    description: >
      Open the interactive settings GUI with /fpp settings.
      Lets admins toggle and configure plugin settings in-game
      without editing config.yml directly.
      Changes are applied and saved immediately on click.
    default: op

  # ── Move (Bot Navigation) ────────────────────────────────────────────────────
  fpp.move:
    description: >
      Navigate a bot to an online player's location with /fpp move <bot> <player>.
      The bot continuously faces and walks toward the target, sprints when far away,
      and jumps over 1-block obstacles. Stops automatically on arrival or if either
      party goes offline or changes world.
    default: op

  # ── Inventory (View/Edit Bot Inventory) ──────────────────────────────────────
  fpp.inventory:
    description: >
      Open and edit a bot's full inventory with /fpp inventory <bot>.
      Lets admins view, add, or remove items from any active bot's inventory
      directly without needing to teleport to the bot or use third-party plugins.
      Bot must have a physical body (not a bodyless bot).
    default: op

  # ── Cmd (Execute Command As Bot) ─────────────────────────────────────────────
  fpp.cmd:
    description: >
      Execute a server command as a bot with /fpp cmd <bot> <command...>.
      The bot's player entity is used as the command sender, so selectors
      like @p resolve relative to the bot's position.
      Example: /fpp cmd Steve say Hello! | /fpp cmd Steve tp 100 64 100
    default: op

  # ── Mine (Block Mining) ────────────────────────────────────────────────────────
  fpp.mine:
    description: >
      Make a bot mine blocks with /fpp mine <bot> [once|stop|--pos1|--pos2|--start].
      Supports classic look-target mining and area mining using a pos1/pos2 cuboid selection.
      Area mining can offload items into named storages set with /fpp storage.
    default: op

  # ── Storage (Named Bot Storage Targets) ───────────────────────────────────────
  fpp.storage:
    description: >
      Register named storage locations for a bot with /fpp storage <bot> [storage_name].
      Look at a container block such as a chest, barrel, hopper, or shulker box.
      If no name is given, numeric names 1, 2, 3... are assigned automatically.
    default: op

  # ── Place (Block Placement / Fill) ────────────────────────────────────────
  fpp.place:
    description: >
      Fill a selected cuboid area with blocks using /fpp place <bot> [--pos1|--pos2|--block <spec>|start|stop].
      Supports weighted multi-block specs (e.g. STONE50%,DIRT50%) and auto-supply from /fpp storage containers.
      Reports missing materials to the command sender before starting.
    default: op

  # ── Use (Right-click Action) ────────────────────────────────────────────────────
  fpp.useitem:
    description: >
      Make a bot right-click whatever it's looking at with /fpp use <bot> [once|stop].
      Works on blocks (open doors, press buttons, place), entities (open villager GUI,
      leash animals, fill item frames), and usable items in air (draw bow, eat food).
      Use 'once' to right-click once, 'stop' to stop.
    default: op

  # ── Waypoint (Named Waypoint Route Management) ────────────────────────────────
  fpp.waypoint:
    description: >
      Manage named waypoint patrol routes with /fpp waypoint (alias: /fpp wp).
      Subcommands: add <route>, remove <route> <index>, delete <route>, clear <route>, list [route].
      Routes are saved to data/waypoints.yml.
      Use /fpp move <bot> --wp <route> to send bots on a looping patrol through all positions.
    default: op

  # ── Badword Filter ────────────────────────────────────────────────────────────
  fpp.badword:
    description: >
      Manage the badword filter and scan/fix active bot names with /fpp badword.
      Subcommands: check (list bots with flagged names, read-only),
      update (despawn flagged bots and respawn with random clean names from bot-names.yml),
      status (show filter configuration, word count, and live scan result).
      Useful for enforcing the badword filter on bots that were spawned before the filter
      was enabled, or after new words were added to the list.
    default: op

  # ── Rename ────────────────────────────────────────────────────────────────────
  fpp.rename:
    description: >
      Rename any active bot with /fpp rename <oldname> <newname>.
      Admin tier — can rename ALL bots regardless of who spawned them.
      Despawns the bot and immediately respawns it under the new name,
      preserving inventory, XP, LP group, chat settings, and frozen state.
    default: op
    children:
      fpp.rename.own: true

  fpp.rename.own:
    description: >
      Rename bots that the sender personally spawned with /fpp rename <oldname> <newname>.
      User opt-in — does NOT allow renaming other players' bots.
      Grant this to players who should be allowed to rename their own bots.
    default: false

  # ── AI Personality ────────────────────────────────────────────────────────────
  fpp.personality:
    description: >
      Manage AI personalities for bots with /fpp personality.
      List personalities: /fpp personality list
      Assign a personality: /fpp personality <bot> set <name>
      Reset to default: /fpp personality <bot> reset
      Show current: /fpp personality <bot> show
      Reload files from disk: /fpp personality reload
      Personality files are .txt files in plugins/FakePlayerPlugin/personalities/.
    default: op



